baseURL = "/"
themesDir = "themes"
theme = "hugo-serif-theme"
languageCode = "en-us"
title = "HAN SONGWEN | 韩松纹"

[params.homepage]
  sticky_header = true
  show_contact_box = false      # 修改为 false：去掉首页中间那个突兀的联系方框
  show_services_button = false 

[params.logo]
  # 如果你没有这两个 svg 文件，建议直接留空 ""
  # 这样 Logo 位置会直接显示上面的 title（韩松纹）文字，更有学术感
  mobile = "" 
  desktop = "" 
  alt = "Han Songwen"

[params.footer]
  # 修改第 70 行：改成你自己的版权信息
  copyright_text = '© 2026 Han Songwen. Specialized in Academic Publishing & AI.'

[menu]
  # 修改导航栏名字（第 73-98 行）
  [[menu.main]]
    name = "Expertise"          # 把 Services 改为 Expertise (专业领域)
    url = "/services/"
    weight = 1

  [[menu.main]]
    name = "Projects"           # 把 Team 改为 Projects (出版项目)
    url = "/services/"          # 暂时也指向 services，或者如果你以后做了项目页再改
    weight = 2

  [[menu.main]]
    name = "Contact"
    url = "/contact/"
    weight = 4
